<div class="container page-content">
  <div class="upload-card glass">
    <div class="header">
      <h1 class="page-title">Gallery Upload</h1>
      <p class="page-description">Share your moments. Images will be saved to your personal gallery.</p>
    </div>

    <div class="upload-form">
      <!-- Image Picker -->
      <div class="picker-area" (click)="fileInput.click()" [class.has-file]="previewUrl">
        <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden>
        
        <div *ngIf="!previewUrl" class="picker-placeholder">
          <span class="material-icons large-icon">add_photo_alternate</span>
          <p>Choose an Image</p>
        </div>

        <img *ngIf="previewUrl" [src]="previewUrl" class="preview-display">
        
        <div *ngIf="previewUrl && !uploadedUrl" class="overlay">
          <span class="material-icons">cached</span>
          <span>Change</span>
        </div>
      </div>

      <!-- Fields -->
      <div class="fields-area">
        <div class="input-group">
          <label>Title</label>
          <input type="text" [(ngModel)]="title" placeholder="Enter a title">
        </div>

        <div class="input-group">
          <label>Description (optional)</label>
          <textarea [(ngModel)]="description" placeholder="Tell us more about this image..." rows="3"></textarea>
        </div>

        <button class="primary-btn" (click)="onUpload()" [disabled]="isUploading || !selectedFile">
          <span class="material-icons" *ngIf="!isUploading">cloud_upload</span>
          <span class="spinner" *ngIf="isUploading"></span>
          {{ isUploading ? 'Uploading...' : 'Publish to Gallery' }}
        </button>

        <div class="status-msg" [class.error]="isError" [class.success]="!isError" *ngIf="message">
          <span class="material-icons">{{ isError ? 'error_outline' : 'check_circle_outline' }}</span>
          {{ message }}
        </div>
      </div>
    </div>
  </div>
</div>
